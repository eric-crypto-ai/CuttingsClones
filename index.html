<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="version" content="1.2" />
  <title>CuttingsClones — Portal del Trabajador</title>
  <style>
    :root {
      --verde: #2d7a2d;
      --verde-claro: #e8f5e8;
      --verde-hover: #236b23;
      --dorado: #b8960c;
      --dorado-claro: #faf4e0;
      --dorado-hover: #a3850a;
      --gris-oscuro: #3a3a3a;
      --gris-texto: #555;
      --gris-borde: #e2e8f0;
      --fondo: #f5f7f2;
      --blanco: #ffffff;
      --rojo: #dc2626;
      --rojo-claro: #fef2f2;
      --naranja: #ea580c;
      --naranja-claro: #fff7ed;
      --radius: 10px;
      --sombra: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --sombra-hover: 0 4px 12px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--fondo);
      color: var(--gris-oscuro);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--verde) 0%, #1a5c1a 100%);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 24px;
      line-height: 1;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-text .subtitle {
      font-size: 12px;
      opacity: 0.9;
      font-weight: 500;
    }

    .header-text .tagline {
      font-size: 10px;
      opacity: 0.7;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── MAIN ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 10px 40px;
    }

    /* ── SECCIONES ── */
    section {
      background: var(--blanco);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: var(--sombra);
      border: 1px solid var(--gris-borde);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--verde-claro);
    }

    .section-icon {
      font-size: 16px;
      width: 30px;
      height: 30px;
      background: var(--verde-claro);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .section-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--verde);
    }

    /* ── INFO UTIL ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .info-chip {
      background: var(--fondo);
      border-radius: 8px;
      padding: 10px;
      border: 1px solid var(--gris-borde);
    }

    .info-chip.full-width {
      grid-column: 1 / -1;
    }

    .info-chip.aviso {
      grid-column: 1 / -1;
      background: var(--dorado-claro);
      border-color: var(--dorado);
    }

    .info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gris-texto);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--gris-oscuro);
    }

    /* ── FORMULARIO IPM ── */
    .form-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--gris-texto);
      letter-spacing: 0.3px;
    }

    input, select {
      padding: 8px 10px;
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: var(--fondo);
      color: var(--gris-oscuro);
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--verde);
      box-shadow: 0 0 0 2px rgba(45,122,45,0.15);
    }

    textarea {
      padding: 8px 10px;
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: var(--fondo);
      color: var(--gris-oscuro);
      transition: border-color 0.15s;
      resize: vertical;
      min-height: 60px;
      width: 100%;
    }

    textarea:focus {
      outline: none;
      border-color: var(--verde);
      box-shadow: 0 0 0 2px rgba(45,122,45,0.15);
    }

    .mensaje.error {
      color: var(--rojo);
    }

    /* ── BOTONES ── */
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* ── ESTADO DESHABILITADO (anti-doble-click) ── */
    .btn:disabled,
    .btn-tick:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
    }

    .tarea-card.busy,
    .compra-item.busy,
    section.busy form {
      opacity: 0.6;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .btn-primary {
      background: var(--verde);
      color: white;
    }

    .btn-primary:hover {
      background: var(--verde-hover);
    }

    .btn-done {
      background: var(--verde-claro);
      color: var(--verde);
      border: 1px solid #c3e6c3;
    }

    .btn-done:hover {
      background: #d4edd4;
    }

    .btn-postpone {
      background: var(--dorado-claro);
      color: #7a6500;
      border: 1px solid #e6d78a;
    }

    .btn-postpone:hover {
      background: #f5edd0;
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 11px;
    }

    .mensaje {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--verde);
    }

    /* ── TABLA IPM ── */
    .tabla-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: var(--verde-claro);
      color: var(--verde);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      padding: 8px 10px;
      text-align: left;
    }

    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--gris-borde);
      color: var(--gris-oscuro);
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* ── TAREAS ── */
    .tareas-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .zona-card {
      border: 1px solid var(--gris-borde);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .zona-header {
      background: var(--verde-claro);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .zona-header:active {
      background: #d8efd8;
    }

    .zona-header h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--verde);
      flex: 1;
    }

    .zona-badge {
      background: var(--verde);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      min-width: 22px;
      text-align: center;
    }

    .zona-icon {
      font-size: 15px;
    }

    .zona-chevron {
      font-size: 12px;
      color: var(--verde);
      transition: transform 0.2s;
    }

    .zona-card.collapsed .zona-chevron {
      transform: rotate(-90deg);
    }

    .zona-card.collapsed .zona-body {
      display: none;
    }

    .zona-body {
      padding: 6px;
    }

    .zona-vacia {
      color: var(--gris-texto);
      font-size: 12px;
      padding: 8px;
      text-align: center;
    }

    .tarea-card {
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 6px;
      background: var(--blanco);
      transition: box-shadow 0.15s;
    }

    .tarea-card:last-child {
      margin-bottom: 0;
    }

    .tarea-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }

    .tarea-titulo {
      font-weight: 600;
      font-size: 13px;
      color: var(--gris-oscuro);
      flex: 1;
      line-height: 1.3;
    }

    .prioridad {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .prioridad.alta {
      background: var(--rojo-claro);
      color: var(--rojo);
    }

    .prioridad.media {
      background: var(--naranja-claro);
      color: var(--naranja);
    }

    .prioridad.baja {
      background: var(--verde-claro);
      color: var(--verde);
    }

    .tarea-meta {
      font-size: 11px;
      color: var(--gris-texto);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tarea-meta strong {
      color: var(--gris-oscuro);
    }

    .tarea-obs {
      font-size: 12px;
      color: var(--gris-texto);
      background: var(--fondo);
      border-radius: 6px;
      padding: 6px 8px;
      margin: 6px 0 0;
      border-left: 3px solid var(--dorado);
      line-height: 1.4;
    }

    .tarea-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .tarea-actions .btn {
      flex: 1;
    }

    /* ── PANEL POSPONER (INLINE) ── */
    .posponer-panel {
      display: none;
      margin-top: 8px;
      padding: 10px;
      background: var(--dorado-claro);
      border: 1px solid #e6d78a;
      border-radius: 8px;
      animation: fadeIn 0.15s ease-out;
    }

    .posponer-panel.visible {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .posponer-panel-label {
      font-size: 11px;
      font-weight: 600;
      color: #7a6500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .posponer-quick {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .posponer-quick .btn {
      flex: none;
    }

    .posponer-custom {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .posponer-custom input[type="date"] {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      background: white;
    }

    .posponer-custom .btn {
      flex-shrink: 0;
    }

    /* ── COMPRAS ── */
    .compras-add {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .compras-add input {
      flex: 1;
    }

    .compras-add .btn {
      flex-shrink: 0;
      font-size: 18px;
      padding: 8px 14px;
    }

    .compra-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      margin-bottom: 6px;
      background: var(--blanco);
      transition: opacity 0.2s;
    }

    .compra-item:last-child {
      margin-bottom: 0;
    }

    .compra-nombre {
      flex: 1;
      font-size: 13px;
      color: var(--gris-oscuro);
    }

    .btn-tick {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--verde);
      background: white;
      color: var(--verde);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .btn-tick:hover {
      background: var(--verde);
      color: white;
    }

    .compras-vacia {
      color: var(--gris-texto);
      font-size: 13px;
      text-align: center;
      padding: 12px;
    }

    /* ── CARGANDO ── */
    .cargando, .error, .sin-datos {
      color: var(--gris-texto);
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }

    .skeleton {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 14px;
      width: 80%;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 640px) {
      main {
        padding: 16px 16px 40px;
      }

      section {
        padding: 18px;
        margin-bottom: 14px;
      }

      .tareas-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }

    @media (max-width: 380px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        flex-direction: column;
      }

      .tarea-actions {
        flex-direction: column;
      }

      .posponer-custom {
        flex-direction: column;
      }

      .posponer-custom input[type="date"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">&#127793;</div>
    <div class="header-text" style="flex: 1;">
      <h1>CuttingsClones</h1>
      <div class="subtitle">Portal del Trabajador</div>
      <div class="tagline">Cultivo Profesional</div>
    </div>
    <a href="gestion.html" title="Gestión económica" style="color: white; text-decoration: none; background: rgba(255,255,255,0.15); padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; white-space: nowrap;">💰 Gestión</a>
  </header>

  <main>
    <!-- TAREAS -->
    <section>
      <div class="section-header">
        <div class="section-icon">&#9745;</div>
        <h2>Tareas por zona</h2>
      </div>
      <div id="contenedorTareas" class="cargando">Cargando tareas...</div>
    </section>

    <!-- TABLA IPM -->
    <section>
      <div class="section-header">
        <div class="section-icon">&#128202;</div>
        <h2>Control IPM</h2>
      </div>
      <div class="tabla-wrapper">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Producto</th>
            </tr>
          </thead>
          <tbody id="tablaIPM">
            <tr><td colspan="2" class="cargando">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- REGISTRO IPM -->
    <section>
      <div class="section-header">
        <div class="section-icon">&#128196;</div>
        <h2>Registrar producto IPM</h2>
      </div>
      <form id="formIPM">
        <div class="form-row">
          <div class="form-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required />
          </div>
          <div class="form-group">
            <label for="producto">Producto</label>
            <select id="producto" required>
              <option value="">Cargando...</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Guardar</button>
      </form>
      <div id="mensaje" class="mensaje"></div>
    </section>

    <!-- NUEVA TAREA -->
    <section>
      <div class="section-header">
        <div class="section-icon">&#43;</div>
        <h2>Nueva tarea</h2>
      </div>
      <form id="formNuevaTarea">
        <div class="form-group" style="margin-bottom: 8px;">
          <label for="ntTarea">Descripci&oacute;n *</label>
          <input type="text" id="ntTarea" placeholder="Ej: Regar zona madres" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="ntZona">Zona *</label>
            <select id="ntZona" required>
              <option value="">Selecciona zona</option>
              <option value="madres">&#127793; Madres</option>
              <option value="esquejes">&#9986;&#65039; Esquejes</option>
              <option value="floracion">&#127800; Floraci&oacute;n</option>
              <option value="limpieza">&#129529; Limpieza</option>
              <option value="mantenimiento">&#128295; Mantenimiento</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ntPrioridad">Prioridad</label>
            <select id="ntPrioridad">
              <option value="media">Media</option>
              <option value="alta">Alta</option>
              <option value="baja">Baja</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ntFecha">Fecha *</label>
            <input type="date" id="ntFecha" required />
          </div>
        </div>
        <div class="form-group" style="margin-top: 8px;">
          <label for="ntObs">Observaciones (opcional)</label>
          <textarea id="ntObs" placeholder="Notas adicionales..."></textarea>
        </div>
        <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
          <button type="submit" class="btn btn-primary">&#43; Crear tarea</button>
          <span id="mensajeNuevaTarea" class="mensaje"></span>
        </div>
      </form>
    </section>

    <!-- COMPRAS -->
    <section>
      <div class="section-header">
        <div class="section-icon">&#128722;</div>
        <h2>Compras</h2>
      </div>
      <div class="compras-add">
        <input type="text" id="compraInput" placeholder="Ej: Micromite 250ml" maxlength="120" />
        <button class="btn btn-primary" onclick="agregarCompra(this)">&#43;</button>
      </div>
      <div id="listaCompras" class="cargando">Cargando...</div>
    </section>

    <!-- INFO UTIL -->
    <section>
      <div class="section-header">
        <div class="section-icon">&#8505;</div>
        <h2>Informaci&oacute;n &uacute;til</h2>
      </div>
      <div class="info-grid">
        <div class="info-chip">
          <div class="info-label">&#128336; Horario</div>
          <div class="info-value" id="horario"><div class="skeleton"></div></div>
        </div>
        <div class="info-chip">
          <div class="info-label">&#128222; Soporte</div>
          <div class="info-value" id="telefono_soporte"><div class="skeleton"></div></div>
        </div>
        <div class="info-chip full-width">
          <div class="info-label">&#128203; Instrucciones</div>
          <div class="info-value" id="instrucciones"><div class="skeleton"></div></div>
        </div>
        <div class="info-chip aviso">
          <div class="info-label">&#9888;&#65039; Aviso del d&iacute;a</div>
          <div class="info-value" id="aviso_del_dia"><div class="skeleton"></div></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const base_url = 'https://primary-production-2cf7.up.railway.app/webhook';

    // ── ICONOS POR ZONA ──
    const zonaIconos = {
      madres: '\u{1F331}',
      esquejes: '\u{2702}\u{FE0F}',
      floracion: '\u{1F338}',
      limpieza: '\u{1F9F9}',
      mantenimiento: '\u{1F527}'
    };

    // ── FECHA HOY ──
    function fechaHoyISO() {
      const h = new Date();
      return h.getFullYear() + '-' + String(h.getMonth() + 1).padStart(2, '0') + '-' + String(h.getDate()).padStart(2, '0');
    }

    // ── ANTI-DOBLE-CLICK: feedback inmediato + bloqueo hasta respuesta ──
    // Patrón de uso: al pulsar un botón que dispara backend, llamar lockBtn(btn, 'Procesando…').
    // En el success path no hace falta unlockBtn si la UI se recarga (la tarjeta se reemplaza).
    // En el catch, SIEMPRE llamar unlockBtn para restaurar por si el operario quiere reintentar.
    function haptic() {
      if (navigator.vibrate) navigator.vibrate(30);
    }

    function lockBtn(btn, busyText) {
      if (!btn) return null;
      haptic();
      btn.disabled = true;
      btn.dataset.originalText = btn.textContent;
      btn.textContent = busyText || 'Procesando…';
      var busyEl = btn.closest('.tarea-card, .compra-item, section');
      if (busyEl) busyEl.classList.add('busy');
      return busyEl;
    }

    function unlockBtn(btn, busyEl) {
      if (!btn) return;
      btn.disabled = false;
      if (btn.dataset.originalText != null) {
        btn.textContent = btn.dataset.originalText;
        delete btn.dataset.originalText;
      }
      if (busyEl) busyEl.classList.remove('busy');
    }

    function ponerFechaHoy() {
      document.getElementById('fecha').value = fechaHoyISO();
    }

    // ── INFO LANDING ──
    async function cargarInfoLanding() {
      try {
        const res = await fetch(base_url + '/info-landing');
        if (!res.ok) throw new Error('error');
        const data = await res.json();
        document.getElementById('horario').textContent = data.horario || '-';
        document.getElementById('instrucciones').textContent = data.instrucciones || '-';
        document.getElementById('telefono_soporte').textContent = data.telefono_soporte || '-';
        document.getElementById('aviso_del_dia').textContent = data.aviso_del_dia || '-';
      } catch (e) {
        ['horario', 'instrucciones', 'telefono_soporte', 'aviso_del_dia'].forEach(function(id) {
          document.getElementById(id).textContent = 'Error al cargar';
        });
      }
    }

    // ── PRODUCTOS IPM ──
    async function cargarProductosIPM() {
      var select = document.getElementById('producto');
      try {
        var res = await fetch(base_url + '/ipm-productos');
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        var items = Array.isArray(data) ? (data[0] && data[0].items ? data[0].items : []) : (data.items || []);
        select.innerHTML = '<option value="">Selecciona producto</option>';
        if (items.length === 0) {
          select.innerHTML = '<option value="">Sin productos</option>';
          return;
        }
        for (var i = 0; i < items.length; i++) {
          var opt = document.createElement('option');
          opt.value = items[i].producto || '';
          opt.textContent = items[i].producto || '';
          select.appendChild(opt);
        }
      } catch (e) {
        select.innerHTML = '<option value="">Error al cargar</option>';
      }
    }

    // ── TABLA IPM ──
    async function cargarTablaIPM() {
      var tabla = document.getElementById('tablaIPM');
      try {
        var res = await fetch(base_url + '/ipm-lista');
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        var items = Array.isArray(data) ? (data[0] && data[0].items ? data[0].items : []) : (data.items || []);
        if (items.length === 0) {
          tabla.innerHTML = '<tr><td colspan="2" class="sin-datos">Sin datos todav\u00eda</td></tr>';
          return;
        }
        var html = '';
        for (var i = 0; i < items.length; i++) {
          html += '<tr><td>' + escapeHtml(items[i].fecha || '') + '</td><td>' + escapeHtml(items[i].producto || '') + '</td></tr>';
        }
        tabla.innerHTML = html;
      } catch (e) {
        tabla.innerHTML = '<tr><td colspan="2" class="error">Error al cargar</td></tr>';
      }
    }

    // ── HELPERS ──
    function capitalizar(t) {
      return t ? t.charAt(0).toUpperCase() + t.slice(1) : '';
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── TAREAS ──
    function renderBloqueZona(zona, tareas) {
      var count = Array.isArray(tareas) ? tareas.length : 0;
      var icono = zonaIconos[zona] || '\u{1F4CC}';

      var body;
      if (count === 0) {
        body = '<p class="zona-vacia">Sin tareas pendientes</p>';
      } else {
        body = '';
        for (var i = 0; i < tareas.length; i++) {
          var t = tareas[i];
          var prioClass = t.prioridad || 'media';
          var prioLabel = t.prioridad || 'media';
          var safeId = escapeAttr(t.id);
          var panelId = 'posponer-' + safeId;

          var mananaDate = calcManana();

          body += '<div class="tarea-card">';
          body += '<div class="tarea-top">';
          body += '<div class="tarea-titulo">' + escapeHtml(t.tarea || '') + '</div>';
          body += '<span class="prioridad ' + escapeAttr(prioClass) + '">' + escapeHtml(prioLabel) + '</span>';
          body += '</div>';
          if (t.fecha) body += '<div class="tarea-meta"><strong>Fecha:</strong> ' + escapeHtml(t.fecha) + '</div>';
          if (t.recurrente) body += '<div class="tarea-meta"><strong>Recurrente:</strong> ' + escapeHtml(String(t.recurrente)) + '</div>';
          if (t.dia_recurrencia) body += '<div class="tarea-meta"><strong>D\u00eda:</strong> ' + escapeHtml(String(t.dia_recurrencia)) + '</div>';
          if (t.observaciones) body += '<div class="tarea-obs">' + escapeHtml(t.observaciones) + '</div>';

          body += '<div class="tarea-actions">';
          body += '<button class="btn btn-done btn-sm" onclick="marcarTareaHecha(this, \'' + safeId + '\')">Hecha \u2713</button>';
          body += '<button class="btn btn-postpone btn-sm" onclick="togglePosponer(\'' + safeId + '\')">Posponer \u23F0</button>';
          body += '</div>';

          // Inline postpone panel
          body += '<div class="posponer-panel" id="' + panelId + '">';
          body += '<div class="posponer-panel-label">Posponer tarea</div>';
          body += '<div class="posponer-quick">';
          body += '<button class="btn btn-postpone btn-sm" onclick="posponerManana(this, \'' + safeId + '\')">Ma\u00f1ana</button>';
          body += '</div>';
          body += '<div class="posponer-custom">';
          body += '<input type="date" id="fecha-' + safeId + '" min="' + mananaDate + '" />';
          body += '<button class="btn btn-primary btn-sm" onclick="posponerConFecha(this, \'' + safeId + '\')">Confirmar</button>';
          body += '</div>';
          body += '</div>';

          body += '</div>';
        }
      }

      return '<div class="zona-card">' +
        '<div class="zona-header" onclick="toggleZona(this)">' +
        '<span class="zona-icon">' + icono + '</span>' +
        '<h3>' + capitalizar(zona) + '</h3>' +
        '<span class="zona-badge">' + count + '</span>' +
        '<span class="zona-chevron">\u25BC</span>' +
        '</div>' +
        '<div class="zona-body">' + body + '</div>' +
        '</div>';
    }

    function toggleZona(headerEl) {
      var card = headerEl.parentElement;
      card.classList.toggle('collapsed');
    }

    async function cargarTareas() {
      var contenedor = document.getElementById('contenedorTareas');
      try {
        var res = await fetch(base_url + '/tareas-lista');
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        var itemsPorZona = data.items_por_zona || {};
        var zonas = ['madres', 'esquejes', 'floracion', 'limpieza', 'mantenimiento'];
        var hoy = fechaHoyISO();
        contenedor.className = 'tareas-grid';
        var html = '';
        for (var i = 0; i < zonas.length; i++) {
          var tareasFiltradas = (itemsPorZona[zonas[i]] || []).filter(function(t) {
            return !t.fecha || t.fecha <= hoy;
          });
          html += renderBloqueZona(zonas[i], tareasFiltradas);
        }
        contenedor.innerHTML = html;
      } catch (e) {
        contenedor.className = 'error';
        contenedor.textContent = 'Error al cargar tareas';
      }
    }

    // ── MARCAR HECHA ──
    async function marcarTareaHecha(btn, id) {
      if (!confirm('\u00bfMarcar esta tarea como hecha?')) return;
      var busyEl = lockBtn(btn, 'Marcando\u2026');
      try {
        var res = await fetch(base_url + '/tareas-eliminar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        });
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        if (!data.ok) throw new Error('no ok');
        await cargarTareas();
        // La tarjeta desaparece con la recarga - no hace falta unlockBtn.
      } catch (e) {
        alert('No se pudo marcar como hecha');
        unlockBtn(btn, busyEl);
      }
    }

    // ── POSPONER ──
    function calcManana() {
      var d = new Date();
      d.setDate(d.getDate() + 1);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function togglePosponer(id) {
      haptic();
      var panel = document.getElementById('posponer-' + id);
      if (!panel) return;
      // Close all other panels first
      var allPanels = document.querySelectorAll('.posponer-panel.visible');
      for (var i = 0; i < allPanels.length; i++) {
        if (allPanels[i] !== panel) {
          allPanels[i].classList.remove('visible');
        }
      }
      panel.classList.toggle('visible');
    }

    async function posponerTarea(btn, id, fecha) {
      var busyEl = lockBtn(btn, 'Posponiendo…');
      try {
        var res = await fetch(base_url + '/tareas-posponer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id, nueva_fecha: fecha })
        });
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        if (!data.ok) throw new Error('no ok');
        await cargarTareas();
      } catch (e) {
        alert('No se pudo posponer la tarea');
        unlockBtn(btn, busyEl);
      }
    }

    function posponerManana(btn, id) {
      var fecha = calcManana();
      posponerTarea(btn, id, fecha);
    }

    function posponerConFecha(btn, id) {
      var input = document.getElementById('fecha-' + id);
      if (!input || !input.value) {
        alert('Selecciona una fecha');
        return;
      }
      posponerTarea(btn, id, input.value);
    }

    // ── FORM IPM ──
    document.getElementById('formIPM').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = e.submitter || this.querySelector('button[type="submit"]');
      var fecha = document.getElementById('fecha').value;
      var producto = document.getElementById('producto').value;
      var mensaje = document.getElementById('mensaje');
      mensaje.textContent = '';

      var busyEl = lockBtn(btn, 'Guardando…');
      try {
        var res = await fetch(base_url + '/ipm-guardar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fecha: fecha, producto: producto })
        });
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        mensaje.textContent = data.mensaje || 'Guardado correctamente';
        document.getElementById('producto').value = '';
        ponerFechaHoy();
        await cargarTablaIPM();
      } catch (e) {
        mensaje.textContent = 'Error al guardar';
      } finally {
        unlockBtn(btn, busyEl);
      }
    });

    // ── CREAR TAREA ──
    document.getElementById('formNuevaTarea').addEventListener('submit', async function(e) {
      e.preventDefault();
      var tarea = document.getElementById('ntTarea').value.trim();
      var zona = document.getElementById('ntZona').value;
      var prioridad = document.getElementById('ntPrioridad').value;
      var fecha = document.getElementById('ntFecha').value;
      var observaciones = document.getElementById('ntObs').value.trim();
      var mensaje = document.getElementById('mensajeNuevaTarea');

      mensaje.textContent = '';
      mensaje.className = 'mensaje';

      if (!tarea || !zona || !fecha) {
        mensaje.textContent = 'Completa los campos requeridos';
        mensaje.className = 'mensaje error';
        return;
      }

      var btnSubmit = this.querySelector('button[type="submit"]');
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Guardando...';

      try {
        var res = await fetch(base_url + '/tareas-crear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tarea: tarea, zona: zona, prioridad: prioridad, fecha: fecha, observaciones: observaciones })
        });
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        if (!data.ok) throw new Error('no ok');
        mensaje.textContent = '\u2713 Tarea creada correctamente';
        document.getElementById('ntTarea').value = '';
        document.getElementById('ntZona').value = '';
        document.getElementById('ntObs').value = '';
        document.getElementById('ntPrioridad').value = 'media';
        document.getElementById('ntFecha').value = fechaHoyISO();
        await cargarTareas();
      } catch (e) {
        mensaje.textContent = 'Error al crear la tarea';
        mensaje.className = 'mensaje error';
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = '\u002B Crear tarea';
      }
    });

    // ── COMPRAS ──
    async function cargarCompras() {
      var lista = document.getElementById('listaCompras');
      try {
        var res = await fetch(base_url + '/compras-lista');
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        var items = data.items || [];
        if (items.length === 0) {
          lista.className = '';
          lista.innerHTML = '<p class="compras-vacia">No hay items pendientes</p>';
          return;
        }
        lista.className = '';
        var html = '';
        for (var i = 0; i < items.length; i++) {
          var it = items[i];
          html += '<div class="compra-item">';
          html += '<span class="compra-nombre">' + escapeHtml(it.item || '') + '</span>';
          html += '<button class="btn-tick" title="Marcar como comprado" onclick="eliminarCompra(this, \'' + escapeAttr(it.id) + '\')">&#10003;</button>';
          html += '</div>';
        }
        lista.innerHTML = html;
      } catch (e) {
        lista.className = 'error';
        lista.textContent = 'Error al cargar';
      }
    }

    async function agregarCompra(btn) {
      var input = document.getElementById('compraInput');
      var item = input.value.trim();
      if (!item) { input.focus(); return; }
      var busyEl = lockBtn(btn, '…');
      input.disabled = true;
      try {
        var res = await fetch(base_url + '/compras-agregar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item: item })
        });
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        if (!data.ok) throw new Error('no ok');
        input.value = '';
        await cargarCompras();
      } catch (e) {
        alert('No se pudo agregar el item');
      } finally {
        input.disabled = false;
        input.focus();
        unlockBtn(btn, busyEl);
      }
    }

    async function eliminarCompra(btn, id) {
      var busyEl = lockBtn(btn, '…');
      try {
        var res = await fetch(base_url + '/compras-eliminar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        });
        if (!res.ok) throw new Error('error');
        var data = await res.json();
        if (!data.ok) throw new Error('no ok');
        await cargarCompras();
        // El ítem desaparece con la recarga.
      } catch (e) {
        alert('No se pudo eliminar el item');
        unlockBtn(btn, busyEl);
      }
    }

    // Enviar con Enter en el input de compras
    document.getElementById('compraInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var addBtn = document.querySelector('.compras-add .btn-primary');
        agregarCompra(addBtn);
      }
    });

    // ── INIT ──
    ponerFechaHoy();
    document.getElementById('ntFecha').value = fechaHoyISO();
    cargarInfoLanding();
    cargarProductosIPM();
    cargarTablaIPM();
    cargarTareas();
    cargarCompras();
  </script>
</body>
</html>
